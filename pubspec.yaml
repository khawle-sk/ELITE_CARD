# ─────────────────────────────────────────────
#  DÉPENDANCES À AJOUTER dans pubspec.yaml
#  (section "dependencies:")
# ─────────────────────────────────────────────

dependencies:
  flutter:
    sdk: flutter

  # Stockage local (base de données clé-valeur ultra-rapide)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Sélecteur de photos depuis la galerie
  image_picker: ^1.0.7

  # Accès au dossier de l'application (pour sauvegarder la carte en PNG)
  path_provider: ^2.1.2

  # Accéléromètre (effet holographique réactif au mouvement)
  sensors_plus: ^5.0.1

  # Génération du QR Code (verso de la carte)
  qr_flutter: ^4.1.0

# ─────────────────────────────────────────────
#  PERMISSIONS À AJOUTER
# ─────────────────────────────────────────────
#
#  Android → android/app/src/main/AndroidManifest.xml :
#  <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
#  <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
#
#  iOS → ios/Runner/Info.plist :
#  <key>NSPhotoLibraryUsageDescription</key>
#  <string>Accès à la galerie pour votre photo de carte</string>
#
# ─────────────────────────────────────────────
#  STRUCTURE DES FICHIERS DU PROJET
# ─────────────────────────────────────────────
#
#  lib/
#  ├── main.dart                  ← Initialise Hive + Lance l'app
#  ├── models/
#  │   └── models.dart            ← BusinessCard + CardTexture
#  └── pages/
#      ├── home_page.dart         ← Accueil : stack de cartes Hive
#      └── studio_page.dart       ← Création / Édition d'une carte
#
# ─────────────────────────────────────────────
#  FLUX DE DONNÉES
# ─────────────────────────────────────────────
#
#  [Studio] ──save──▶ Hive.box('cards').put(id, card.toMap())
#                           │
#  [Home]  ◀──listen── ValueListenableBuilder(box.listenable())
#                           │
#                    Affiche les cartes en PageView
#                           │
#  [Clic sur carte] ──▶ Navigator.push(StudioPage(existingCard: card))
#                           │
#  [Mettre à jour] ──▶ box.put(même id) → Home se rafraîchit auto
#  [Supprimer]     ──▶ box.delete(id)  → Home se rafraîchit auto

flutter:
  uses-material-design: true  # <--- Assurez-vous que cette ligne est exactement comme ça